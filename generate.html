<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Invitation Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
    :root {
        --hot-pink: #ff1493;
        --royal-blue: #0047ab;
        --white: #ffffff;
        --bg-accent: #f0f7ff;
        --text: #2d3436;
    }
    body {
        margin: 0; padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, var(--bg-accent), #ffe6f2);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 400px;
        width: 90%;
    }
    h1 {
        font-family: 'Great Vibes', cursive;
        color: var(--hot-pink);
        font-size: 3rem;
        margin-top: 0;
        margin-bottom: 20px;
    }
    input[type="text"] {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 1rem;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: border-color 0.3s;
        box-sizing: border-box;
    }
    input[type="text"]:focus {
        border-color: var(--royal-blue);
    }
    .btn {
        display: inline-block; padding: 15px 30px; border-radius: 50px;
        font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1rem;
        background: var(--royal-blue); color: white; border: none; cursor: pointer; transition: 0.4s;
        width: 100%;
        box-sizing: border-box;
    }
    .btn:hover { background: var(--hot-pink); transform: translateY(-2px); }
    
    #resultArea {
        margin-top: 30px;
        display: none;
        text-align: left;
    }
    .link-box {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        word-break: break-all;
        font-size: 0.9rem;
        margin-bottom: 15px;
        color: #555;
    }
    .btn-copy {
        background: var(--hot-pink);
    }
    .btn-copy:hover {
        background: var(--royal-blue);
    }
    </style>
</head>
<body>

<div class="card">
    <h1>Invite a Guest</h1>
    <p style="margin-bottom: 20px; color: #666;">Enter the name of your guest to generate a personalized invitation link.</p>
    
    <input type="text" id="guestNameInput" placeholder="E.g. Uncle John & Family" />
    <button class="btn" onclick="generateLink()">Generate Link</button>
    
    <div id="resultArea">
        <p style="font-weight: 600; margin-bottom: 10px;">Generated Link:</p>
        <div class="link-box" id="generatedLink"></div>
        <button class="btn btn-copy" onclick="copyLink()">Copy Link</button>
    </div>
</div>

<script>
function generateLink() {
    const name = document.getElementById('guestNameInput').value.trim();
    if (!name) {
        alert("Please enter a name");
        return;
    }
    
    // Get current URL and replace generate.html with index.html
    let currentUrl = window.location.href;
    let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
    
    if (currentUrl.endsWith('/')) {
        baseUrl = currentUrl.slice(0, -1);
    } else if (!currentUrl.includes('.html')) {
        baseUrl = currentUrl;
    }

    const encodedName = encodeURIComponent(name);
    // Construct final link using baseUrl
    const finalLink = `${baseUrl}/index.html?n=${encodedName}`;
    
    document.getElementById('generatedLink').textContent = finalLink;
    document.getElementById('resultArea').style.display = 'block';
}

function copyLink() {
    const linkText = document.getElementById('generatedLink').textContent;
    navigator.clipboard.writeText(linkText).then(() => {
        const copyBtn = document.querySelector('.btn-copy');
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        copyBtn.style.background = '#28a745'; // Green success
        setTimeout(() => {
            copyBtn.textContent = originalText;
            copyBtn.style.background = 'var(--hot-pink)';
        }, 2000);
    }).catch(err => {
        console.error('Failed to copy: ', err);
        alert('Failed to copy link. Please select and copy manually.');
    });
}
</script>

</body>
</html>
